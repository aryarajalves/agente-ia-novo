name: agente

services:
  db:
    image: pgvector/pgvector:pg14
    container_name: banco-agente-local
    env_file:
      - ../.env
    ports:
      - "${POSTGRES_PORT_EXTERNAL:-5433}:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 5
 
  redis:
    image: redis:7-alpine
    container_name: redis-agente-local
    ports:
      - "6379:6379"

  backend:
    build: ../backend
    container_name: backend-agente-local
    env_file:
      - ../.env
    ports:
      - "8002:8000"
    volumes:
      - ../backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ai_agent_db}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-1}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      - PYTHONUNBUFFERED=1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
 
  beat:
    build: ../backend
    container_name: beat-agente-local
    command: celery -A celery_app beat --loglevel=info
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ai_agent_db}
      - PYTHONPATH=/app
    volumes:
      - ../backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: ../backend
    container_name: worker-agente-local
    command: celery -A celery_app worker --loglevel=info --concurrency=1
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ai_agent_db}
      - PYTHONPATH=/app
    volumes:
      - ../backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: development
    container_name: frontend-agente-local
    env_file:
      - ../.env
    ports:
      - "5302:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - backend

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel-agente
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    env_file:
      - ../.env
    depends_on:
      - backend

  minio:
    image: minio/minio:RELEASE.2023-05-18T00-05-36Z
    container_name: minio-agente-local
    ports:
      - "9008:9000"
      - "9009:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_local_data:/data

volumes:
  postgres_local_data:
  minio_local_data:

